<div class="sidebar-footer">
  <app-icon-button
    size="sidebar"
    [label]="
      'common.themeToggleAria'
        | transloco: { theme: (themeService.isDark() ? 'common.themeLight' : 'common.themeDark') | transloco }
    "
    (clicked)="themeService.toggle()"
  >
    @if (themeService.isDark()) {
      <svg viewBox="0 0 20 20" aria-hidden="true">
        <circle cx="10" cy="10" r="4" fill="currentColor" />
        <path
          d="M10 1v2M10 17v2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M1 10h2M17 10h2M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    } @else {
      <svg viewBox="0 0 20 20" aria-hidden="true">
        <path d="M15.5 11.5a5.5 5.5 0 0 1-9-4.2 5.5 5.5 0 1 0 9 4.2Z" fill="currentColor" />
      </svg>
    }
  </app-icon-button>

  <app-icon-button
    size="sidebar"
    [label]="'layout.logout' | transloco"
    [disabled]="authService.isBusy()"
    (clicked)="authService.logout()"
  >
    <svg viewBox="0 0 20 20" aria-hidden="true">
      <path
        d="M7 3H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2M13 14l4-4-4-4M17 10H7"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </app-icon-button>
</div>
