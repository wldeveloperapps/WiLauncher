<div class="layout">
  <aside class="layout__sidebar">
    <a class="layout__logo" routerLink="/" [attr.aria-label]="'layout.home' | transloco">
      <img src="assets/images/wiloc-mark.png" alt="Wiloc" width="28" height="28" />
    </a>

    <nav class="layout__nav">
      <a
        routerLink="/"
        routerLinkActive="layout__nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        [attr.aria-label]="'layout.navInventory' | transloco"
        [attr.title]="'layout.navInventory' | transloco"
      >
        <svg viewBox="0 0 20 20" aria-hidden="true">
          <rect x="2" y="2" width="7" height="7" rx="1" fill="currentColor" />
          <rect x="11" y="2" width="7" height="7" rx="1" fill="currentColor" />
          <rect x="2" y="11" width="7" height="7" rx="1" fill="currentColor" />
          <rect x="11" y="11" width="7" height="7" rx="1" fill="currentColor" />
        </svg>
      </a>
      <a
        routerLink="/audit"
        routerLinkActive="layout__nav-link--active"
        [attr.aria-label]="'layout.navAudit' | transloco"
        [attr.title]="'layout.navAudit' | transloco"
      >
        <svg viewBox="0 0 20 20" aria-hidden="true">
          <path
            d="M5 3h7l3 3v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          />
          <path d="M12 3v4h4" fill="none" stroke="currentColor" stroke-width="1.5" />
          <path d="M7 11h6M7 14h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </a>
    </nav>

    <div class="layout__footer">
      @if (showDevRolePicker) {
        <label class="layout__role-picker" [attr.title]="'layout.devRole' | transloco">
          <span class="sr-only">{{ 'layout.devRole' | transloco }}</span>
          <select
            class="layout__role-select font-mono"
            [value]="sessionService.role()"
            (change)="onDevRoleChange($event)"
          >
            @for (role of devRoles; track role) {
              <option [value]="role">{{ role }}</option>
            }
          </select>
        </label>
      }
      <button
        type="button"
        class="layout__icon-btn"
        [attr.aria-label]="'common.themeToggleAria' | transloco: { theme: (themeService.isDark() ? 'common.themeLight' : 'common.themeDark') | transloco }"
        (click)="themeService.toggle()"
      >
        @if (themeService.isDark()) {
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <circle cx="10" cy="10" r="4" fill="currentColor" />
            <path
              d="M10 1v2M10 17v2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M1 10h2M17 10h2M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        } @else {
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path
              d="M15.5 11.5a5.5 5.5 0 0 1-9-4.2 5.5 5.5 0 1 0 9 4.2Z"
              fill="currentColor"
            />
          </svg>
        }
      </button>
      <button
        type="button"
        class="layout__icon-btn"
        [attr.aria-label]="'layout.logout' | transloco"
        [disabled]="authService.isBusy()"
        (click)="authService.logout()"
      >
        <svg viewBox="0 0 20 20" aria-hidden="true">
          <path
            d="M7 3H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2M13 14l4-4-4-4M17 10H7"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  </aside>

  <main class="layout__main">
    @if (sessionService.errorMessage()) {
      <p class="layout__error">{{ sessionService.errorMessage() }}</p>
    }
    @if (authService.errorMessage()) {
      <p class="layout__error">{{ authService.errorMessage() }}</p>
    }
    <router-outlet />
  </main>
</div>
